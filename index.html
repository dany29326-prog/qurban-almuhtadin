  <style>
    @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9A84C;
      --gold-light: #F0D080;
      --green: #1B6B3A;
      --green-light: #2E9E5B;
      --cream: #FAF6EE;
      --dark: #1A1208;
    }

    body {
      min-height: 100vh;
      background: var(--dark);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Plus Jakarta Sans', sans-serif;
      overflow: hidden;
    }

    .bg {
      position: fixed; inset: 0; z-index: 0;
      background-image: url('https://i.postimg.cc/N0Qd8FC8/poster-qurban-al-muhtadin-JADii-I.webp');
      background-size: cover;
      background-position: center;
      filter: brightness(0.35) saturate(0.8);
    }

    .overlay {
      position: fixed; inset: 0; z-index: 1;
      background: radial-gradient(ellipse at center, transparent 30%, rgba(10,6,2,0.85) 100%);
    }

    .card {
      position: relative; z-index: 2;
      background: rgba(20, 14, 4, 0.75);
      border: 1px solid rgba(201,168,76,0.35);
      border-radius: 20px;
      padding: 48px 52px;
      max-width: 520px;
      width: 90%;
      text-align: center;
      backdrop-filter: blur(16px);
      box-shadow: 0 0 60px rgba(201,168,76,0.12), 0 30px 80px rgba(0,0,0,0.6);
      animation: fadeUp 0.9s cubic-bezier(.22,1,.36,1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(32px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .ornament {
      display: flex; align-items: center; gap: 12px;
      justify-content: center;
      margin-bottom: 24px;
    }
    .ornament-line {
      flex: 1; height: 1px;
      background: linear-gradient(to right, transparent, var(--gold));
    }
    .ornament-line.right {
      background: linear-gradient(to left, transparent, var(--gold));
    }
    .ornament svg { width: 28px; height: 28px; fill: var(--gold); }

    .badge {
      display: inline-block;
      background: linear-gradient(135deg, var(--green), var(--green-light));
      color: #fff;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 16px;
      border-radius: 99px;
      margin-bottom: 20px;
    }

    h1 {
      font-family: 'Amiri', serif;
      font-size: 28px;
      color: var(--gold-light);
      line-height: 1.35;
      margin-bottom: 14px;
      text-shadow: 0 2px 20px rgba(201,168,76,0.3);
    }

    p {
      color: rgba(250,246,238,0.65);
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 36px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--gold) 0%, #a8772a 100%);
      color: var(--dark);
      font-family: 'Plus Jakarta Sans', sans-serif;
      font-weight: 700;
      font-size: 14px;
      padding: 14px 32px;
      border-radius: 12px;
      text-decoration: none;
      letter-spacing: 0.3px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 24px rgba(201,168,76,0.35);
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 32px rgba(201,168,76,0.5);
    }
    .btn svg { width: 18px; height: 18px; fill: var(--dark); }

    .footer-note {
      margin-top: 28px;
      font-size: 11px;
      color: rgba(250,246,238,0.3);
      letter-spacing: 0.5px;
    }
  </style>
